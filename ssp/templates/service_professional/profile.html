{% extends "base.html" %}
{% block title %}Profile - CampusCart{% endblock %}



{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="mb-4"><i class="bi bi-person-circle"></i> My Profile</h1>
            <div class="card">
                <div class="card-header">Profile Information</div>
                <div class="card-body">
                    <form action="{{ url_for('ssp.profile') }}" method="POST">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" value="{{ user.name }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" value="{{ user.email }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label for="gender" class="form-label">Gender</label>
                                <select class="form-control" id="gender" name="gender">
                                    <option value="">Select...</option>
                                    <option value="Male" {% if user.gender=='Male' %}selected{% endif %}>Male</option>
                                    <option value="Female" {% if user.gender=='Female' %}selected{% endif %}>Female
                                    </option>
                                    <option value="Other" {% if user.gender=='Other' %}selected{% endif %}>Other
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="service_type" class="form-label">Service Type</label>
                                <select class="form-control" id="service_type" name="service_type">
                                    <option value="">Select...</option>
                                    <option value="grocery" {% if user.service_type=='grocery' %}selected{% endif %}>
                                        Grocery</option>
                                    <option value="stationery" {% if user.service_type=='stationery' %}selected{% endif
                                        %}>Stationery</option>
                                    <option value="printing" {% if user.service_type=='printing' %}selected{% endif %}>
                                        Printing</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="text" class="form-control" id="phone" name="phone"
                                    value="{{ user.phone or '' }}">
                            </div>
                            <div class="col-md-6">
                                <label for="address" class="form-label">Address</label>
                                <input type="text" class="form-control" id="address" name="address"
                                    value="{{ user.address or '' }}">
                            </div>
                            <div class="col-12">
                                <span
                                    class="badge {% if user.is_verified %}bg-success{% else %}bg-warning text-dark{% endif %}">
                                    {% if user.is_verified %}Verified{% else %}Pending Verification{% endif %}
                                </span>
                                <small class="text-muted ms-2">Joined: {{ user.created_date.strftime('%d %b %Y')
                                    }}</small>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-3"><i class="bi bi-save"></i> Save
                            Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
