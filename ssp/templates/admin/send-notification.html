{% extends "base.html" %}
{% block title %}Send Notification - CampusCart Admin{% endblock %}



{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="mb-4"><i class="bi bi-megaphone"></i> Send Notification</h1>
            <div class="card">
                <div class="card-header">New Notification</div>
                <div class="card-body">
                    <form action="{{ url_for('admin.add_notification') }}" method="POST">
                        <div class="mb-3">
                            <label for="user_id" class="form-label">Send to</label>
                            <select class="form-control" id="user_id" name="user_id" required>
                                <option value="all">📢 All Users</option>
                                {% for user in users %}
                                <option value="{{ user.id }}">{{ user.name }} ({{ user.email }} — {{ user.role_name }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Message</label>
                            <textarea class="form-control" id="message" name="message" rows="3" required
                                placeholder="Type your notification..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> Send
                            Notification</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
