{% extends "base.html" %}
{% block title %}Profile - CampusCart{% endblock %}



{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h1 class="mb-4"><i class="bi bi-person-circle"></i> My Profile</h1>

      {% if incomplete %}
      <div class="alert alert-warning">
        <i class="bi bi-exclamation-triangle"></i> Please complete your profile to get a better experience.
      </div>
      {% endif %}

      <div class="card">
        <div class="card-header">Profile Information</div>
        <div class="card-body">
          <form action="{{ url_for('student.profile') }}" method="POST">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" value="{{ user.name }}" disabled>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" value="{{ user.email }}" disabled>
              </div>
              <div class="col-md-6">
                <label for="gender" class="form-label">Gender</label>
                <select class="form-control" id="gender" name="gender">
                  <option value="">Select...</option>
                  <option value="Male" {% if user.gender=='Male' %}selected{% endif %}>Male</option>
                  <option value="Female" {% if user.gender=='Female' %}selected{% endif %}>Female</option>
                  <option value="Other" {% if user.gender=='Other' %}selected{% endif %}>Other</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone" value="{{ user.phone or '' }}"
                  placeholder="10-digit number">
              </div>
              <div class="col-md-6">
                <label for="block_no" class="form-label">Block / Room Number</label>
                <input type="text" class="form-control" id="block_no" name="block_no" value="{{ user.block_no or '' }}"
                  placeholder="e.g., B-204">
              </div>
              <div class="col-md-6">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address" name="address" value="{{ user.address or '' }}"
                  placeholder="Your delivery address">
              </div>
              <div class="col-12">
                <small class="text-muted">Account created: {{ user.created_date.strftime('%d %b %Y') }}</small>
              </div>
            </div>
            <button type="submit" class="btn btn-primary mt-3"><i class="bi bi-save"></i> Save Changes</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
