{% extends "base.html" %}
{% block title %}Register - CampusCart{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
      <div class="text-center mb-4">
        <h1><i class="bi bi-cart4"></i> CampusCart</h1>
        <p class="lead">Create your account</p>
      </div>

      <div class="card">
        <div class="card-header text-center">Register</div>
        <div class="card-body p-4">
          <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" name="name" placeholder="Your name" required
                minlength="2" />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="your@email.com" required />
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" placeholder="Min 6 characters"
                required minlength="6" />
            </div>
            <div class="mb-3">
              <label for="confirm_password" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                placeholder="Re-enter password" required />
            </div>
            <div class="mb-4">
              <label for="role" class="form-label">Register as</label>
              <select class="form-control" id="role" name="role" required>
                <option value="">Select role...</option>
                <option value="student">Student</option>
                <option value="service_professional">Service Provider</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Register</button>
          </form>
          <div class="text-center mt-3">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}"
                style="color: var(--primary-color); font-weight: 600;">Login here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
